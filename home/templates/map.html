{% extends 'main/homepage.html' %}
{% block content %}
<div class="collapse collapse-horizontal" id="moreinfo" style="position: absolute; z-index: 9999;left: 0px; height: calc(100% - 50px); top: 50px;">
    <button id="close">X</button>
    <div class="card card-body" id="AirportInfo" style="width: 700px ;height: 95%"></div>
</div>
<div id="map" style="height: calc(100% - 50px); width: 100%; position: absolute; top: 50px; left: 0;"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.1/leaflet.markercluster.js"></script>

<script>
    console.log("Initializing Map...");

    var map = L.map('map').setView([0, 0], 3);  // Center map globally

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Create a Airport cluster group
    var airportLayer = L.markerClusterGroup();
    map.addLayer(airportLayer);

    var overlays = {
        "Airports": airportLayer
    };

    L.control.layers(null, overlays).addTo(map);


    // Function to load airports based on map bounds and zoom level
    function loadAirports() {
        if (!map.hasLayer(airportLayer)) {
            return; // Airports toggled off
        }

        var bounds = map.getBounds();
        var southwest = bounds.getSouthWest();
        var northeast = bounds.getNorthEast();
        var zoomLevel = map.getZoom();  // Get the zoom level

        // Make an AJAX request to the server to get airports within the bounds
        fetch('/get_airports_within_bounds/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                southwest: {lat: southwest.lat, lng: southwest.lng},
                northeast: {lat: northeast.lat, lng: northeast.lng},
                zoom_level: zoomLevel  // Send zoom level to the server
            })
        })
            .then(response => response.json())
            .then(data => {
                // Clear existing markers
                airportLayer.clearLayers();

                // Add new markers for the airports in the current bounds
                data.forEach(airport => {
                    var marker = L.marker([airport.lat, airport.lon]);
                    var popup = L.popup()
                        .setContent(`
                                       <b>${airport.name}</b><br>
                                       ICAO: ${airport.icao}<br>
                                       <button onclick="openAirport('${airport.icao}')">
                                           More Info
                                       </button>
                                   `)
                        .openOn(marker)
                    marker.bindPopup(popup); 
                    marker.on("click", displayMarkerMessage);

                    function displayMarkerMessage(){
                        popup.openOn(map);
                    }
        
                    airportLayer.addLayer(marker);
                });
            });
    }

    // Trigger the loadAirports function when the map is moved, zoomed, or resized
    let reloadTimeout;

    function scheduleReload() {
        clearTimeout(reloadTimeout);
        reloadTimeout = setTimeout(loadAirports, 300);
    }

    map.on('moveend', scheduleReload);
    map.on('zoomend', scheduleReload);

    map.on('overlayadd', function (e) {
        if (e.name === "Airports") {
            loadAirports();
        }
    });


    // Initial load of airports
    loadAirports();

    
    const CollElm = document.getElementById("moreinfo");
    const bcCollapse = new bootstrap.Collapse(CollElm, {toggle: false});
    function openAirport(icao){
        if (CollElm.classList.contains("show")) {
            bcCollapse.hide();
            setTimeout(function() {
            bcCollapse.show();
            },600)
        }
        
        fetch('/get_airport_info/',{
             method: 'POST',
             headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
             },
             body: JSON.stringify({
                 icao: icao
             })
                                  })
            .then(response => response.json())
            .then(data => {
                    const airport = data[0]

                    document.getElementById("AirportInfo").innerHTML = `
                    <h1>${airport.name}</h1>
                    <p>${airport.icaoId}</p>
                    <div style="display: flex;">
                        <svg style="margin-right: 5px;" width="24px" height="24px" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#000000" stroke-width="0.00028"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" stroke="#CCCCCC" stroke-width="0.504"></g><g id="SVGRepo_iconCarrier"><path clip-rule="evenodd" d="M10 7.88974C11.1046 7.88974 12 6.98912 12 5.87814C12 4.76716 11.1046 3.86654 10 3.86654C8.89543 3.86654 8 4.76716 8 5.87814C8 6.98912 8.89543 7.88974 10 7.88974ZM10 6.5822C10.3866 6.5822 10.7 6.26698 10.7 5.87814C10.7 5.4893 10.3866 5.17408 10 5.17408C9.6134 5.17408 9.3 5.4893 9.3 5.87814C9.3 6.26698 9.6134 6.5822 10 6.5822Z" fill="#000000" fill-rule="evenodd"></path><path clip-rule="evenodd" d="M5.15 5.62669C5.15 3.0203 7.37393 1 10 1C12.6261 1 14.85 3.0203 14.85 5.62669C14.85 6.06012 14.8114 6.53528 14.7269 7.03578L18 7.8588L25.7575 5.90818C26.0562 5.83306 26.3727 5.90057 26.6154 6.09117C26.8581 6.28178 27 6.57423 27 6.88395V23.9826C27 24.4441 26.6877 24.8464 26.2425 24.9584L18.2425 26.97C18.0833 27.01 17.9167 27.01 17.7575 26.97L10 25.0193L2.24254 26.97C1.94379 27.0451 1.6273 26.9776 1.38459 26.787C1.14187 26.5964 1 26.3039 1 25.9942V8.89555C1 8.43402 1.3123 8.03172 1.75746 7.91978L5.2731 7.03578C5.18863 6.53528 5.15 6.06012 5.15 5.62669ZM10 2.70986C8.20779 2.70986 6.85 4.06691 6.85 5.62669C6.85 7.21686 7.5125 9.57287 9.40979 11.3615C9.74241 11.6751 10.2576 11.6751 10.5902 11.3615C12.4875 9.57287 13.15 7.21686 13.15 5.62669C13.15 4.06691 11.7922 2.70986 10 2.70986ZM5.80904 8.97453L3.22684 9.62382C3.09349 9.65735 3 9.77726 3 9.91476V24.3212C3 24.5165 3.18371 24.6598 3.37316 24.6121L8.77316 23.2543C8.90651 23.2208 9 23.1009 9 22.9634V13.2506C7.40353 12.024 6.39235 10.4792 5.80904 8.97453ZM11 13.2506V22.9634C11 23.1009 11.0935 23.2208 11.2268 23.2543L16.6268 24.6121C16.8163 24.6598 17 24.5165 17 24.3212V9.91477C17 9.77726 16.9065 9.65735 16.7732 9.62382L14.191 8.97453C13.6076 10.4792 12.5965 12.024 11 13.2506ZM25 22.9634C25 23.1009 24.9065 23.2208 24.7732 23.2543L19.3732 24.6121C19.1837 24.6598 19 24.5165 19 24.3212V9.91477C19 9.77726 19.0935 9.65736 19.2268 9.62382L24.6268 8.26599C24.8163 8.21835 25 8.36159 25 8.55693V22.9634Z" fill="#000000" fill-rule="evenodd"></path></g></svg>
                        <p>${airport.country}</p>
                    </div>
                    <div style="display: flex;">
                        <svg style="align-self: center" width="64px" height="64px" viewBox="0 0 1024 1024" class="icon" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path d="M809.3 362c0-164.2-133.1-297.3-297.3-297.3S214.7 197.8 214.7 362c0 50.6 12.7 98.2 34.9 139.9h-1.3l262.4 457.4 262.5-454.6h-0.3c23.2-42.3 36.4-91 36.4-142.7z" fill="#F15322"></path><path d="M809.3 362c0-164.2-133.1-297.3-297.3-297.3-13.6 0-26.9 0.9-40 2.7 145.3 19.5 257.3 144 257.3 294.6 0 51.7-13.2 100.3-36.5 142.7h0.3L470.9 889.8l39.9 69.5 262.5-454.6h-0.3c23.1-42.3 36.3-91 36.3-142.7z" fill="#FF8564"></path><path d="M512 350.7m-186.4 0a186.4 186.4 0 1 0 372.8 0 186.4 186.4 0 1 0-372.8 0Z" fill="#25A0C8"></path><path d="M580.7 177.4c-2.6 1.4-5.1 2.9-7.6 4.5-20.7 13.4-34.8 36.1-27.1 56.7 7.7 20.8 33.5 32.8 50.9 49.3 25.2 23.8 30.5 63.2 3.7 85.9-9.2 7.8-21.3 13.2-29.5 21.6-20.6 21.4-7.4 55 19 71.7 14.9 9.4 32.5 14.7 51 18.1 35.3-33.9 57.3-81.6 57.3-134.4 0-78.7-48.7-146-117.7-173.4zM392.3 373.3c-2.9-28.6 26.7-56.4 15.5-82.9-9.3-21.9-39.2-24.6-62.6-20.3l-1.5 0.3c-11.7 24.4-18.2 51.6-18.2 80.4 0 72.9 41.8 136 102.8 166.6 3.1-2.1 6.1-4.5 8.8-7.2 18.6-19 17.5-51.8 2-73.4-15.5-21.8-44.1-36.8-46.8-63.5z" fill="#AFD555"></path><path d="M553.1 222m-25 0a25 25 0 1 0 50 0 25 25 0 1 0-50 0Z" fill="#FFFDFD"></path></g></svg>
                        <div">
                            <p>${airport.elev}</p>
                            <p>${airport.lat}</p>
                            <p>${airport.lon}</p>
                        </div>
                    </div>
                    
                    ${airport.freqs
                    .split(";")
                    .map(freq => `
                    <svg width="64px" height="64px" viewBox="0 0 24 24" id="frequency-2" data-name="Flat Line" xmlns="http://www.w3.org/2000/svg" class="icon flat-line" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><polyline id="primary" points="21 12 17 12 15 16 11 8 8 15 6 12 3 12" style="fill: none; stroke: #000000; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2;"></polyline></g></svg>
                    <p>${freq}</p>`)
                    .join("")}

                    ${airport.runways .map(r => `
                    <p>${r.id}</p>
                    <p>${r.alignment}</p>
                    `) .join('')} `

    })
        setTimeout(function() {
            bcCollapse.show();
        },300);
    }
    document.getElementById("close").addEventListener("click", () => {
        bcCollapse.hide()
    });

    
    let planeMarkers = {};
    async function updatePlanes() {
        const res = await fetch("/api/planes/");
        const data = await res.json();

        if (!data.states) return;

        data.states.forEach(state => {
            const icao = state[0];
            const lat = state[6];
            const lon = state[5];

            if (lan === null || lon ===null) return;

            //If marker exists, move it
            if (planeMarkers[icao]) {
                planeMarkers[icao].setLatLng([lat, lon]);
            } else {
                //Create new marker
                const marker = L.marker([lat, lon]).addTo(map);
                marker.bindPopup(`ICAO: ${icao}`);
                planeMarkers[icao] = marker;
            }
        })
    }

    setInterval(updatePlanes, 5000);
    updatePlanes();

</script>

{% endblock %}
